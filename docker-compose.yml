
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dqp_db
      POSTGRES_USER: dqp_user
      POSTGRES_PASSWORD: dqp_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dqp_user -d dqp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: